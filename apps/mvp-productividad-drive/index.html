<!DOCTYPE html>

    <script src="config.js"></script>
    <script src="app.js" defer></script>

</head>
<body>

<h2>Registro Actividad</h2>

<label>Bloque</label>
<select id="bloque"></select>

<label>Tema Plan</label>

<label>Subtema Plan</label>

<label>Actividad Plan</label>

<label>Prioridad</label>

<label>Regla de Oro</label>

<hr>

<h3>Registro Real</h3>

<input id="temaR" placeholder="Tema Real">
<input id="subtemaR" placeholder="Subtema Real">
<input id="actividadR" placeholder="Actividad Real">

<button onclick="guardar()">Guardar</button>

<p id="status"></p>
