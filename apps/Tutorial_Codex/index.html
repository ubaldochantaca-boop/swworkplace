<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Diarias</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mis Tareas Diarias</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <main>
            <section class="task-input">
                <form id="taskForm">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="¿Qué tarea quieres agregar hoy?"
                        maxlength="100"
                        required
                    >
                    <button type="submit" id="addBtn">
                        <span>+</span> Agregar Tarea
                    </button>
                </form>
            </section>

            <section class="task-stats">
                <div class="stat">
                    <span class="stat-number" id="totalTasks">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="completedTasks">0</span>
                    <span class="stat-label">Completadas</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span class="stat-label">Pendientes</span>
                </div>
            </section>

            <section class="task-filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </section>

            <section class="task-list">
                <ul id="taskList">
                    <!-- Las tareas se agregarán dinámicamente aquí -->
                </ul>
                <div class="empty-state" id="emptyState">
                    <p>📝 No hay tareas aún. ¡Agrega tu primera tarea!</p>
                </div>
            </section>

            <section class="task-actions">
                <button id="clearCompleted" class="secondary-btn">
                    Eliminar Completadas
                </button>
                <button id="clearAll" class="danger-btn">
                    Eliminar Todas
                </button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
